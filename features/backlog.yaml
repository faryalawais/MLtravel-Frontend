  - id: F-002
    title: "Contact — demo booking flow"
    persona: Travel agency decision-maker
    slice: parent
    story: >-
      As a prospect I want to pick a day and time for a live demo so I can
      see the platform without committing to a contract.
    acceptance_criteria:
      - "Guest can complete the 4-step flow: choose day → choose hour → details → summary"
      - "Each step matches the corresponding Figma frame"
      - "Form validation on details step (name, email required)"
      - "MUST feature-split → F-002.1 API (if any), F-002.2 UI"
    priority: 2
    status: pending
    depends_on: [LP-001]
    figma_frames:
      - { name: "Choose day", node_id: "5185:4332" }
      - { name: "Choose hour", node_id: "5186:4533" }
      - { name: "Details", node_id: "5186:4857" }
      - { name: "Summary", node_id: "5198:4102" }
    registry_roots:
      - "screen.contact.*"
      - "component.contact.*"

  - id: F-003
    title: "How It Works"
    persona: Travel agency decision-maker
    slice: parent
    story: >-
      As a prospect I want to understand the onboarding process so I know
      what switching to ML Travel involves.
    acceptance_criteria:
      - "Guest can view the how-it-works page matching HIW-Desktop"
      - "FAQ section expands and collapses"
      - "Mid-page and final CTAs link to contact / demo booking (F-002)"
      - "MUST feature-split → F-003.1 API (if any), F-003.2 UI"
    priority: 3
    status: pending
    depends_on: [LP-001]
    figma_frames:
      - { name: "HIW-Desktop", node_id: "5217:6697" }
      - { name: "HIWHeroSection", node_id: "5217:6699" }
      - { name: "HowItWorksSection", node_id: "5217:6700" }
      - { name: "SixWeekSection", node_id: "5217:6705" }
      - { name: "FAQSection", node_id: "5261:8072" }
      - { name: "FinalCTASection", node_id: "5217:7555" }
      - { name: "Footer", node_id: "5217:6714" }
    registry_roots:
      - "screen.how-it-works.*"
      - "component.how-it-works.*"
