  - id: CP-002
    title: "Contact Us — Calendly demo booking"
    persona: Every visitor
    slice: parent
    story: >-
      As a visitor I want to book a live demo via Calendly embeds on the
      Contact Us page so I can schedule without sales back-and-forth.
    acceptance_criteria:
      - "Guest can complete the booking flow: choose date/time → hours → details → summary"
      - "Calendly iframe embeds power scheduling; page chrome matches Figma"
      - "Each step matches the corresponding Figma frame"
      - "MUST feature-split → CP-002.1 API (if any), CP-002.2 UI"
    priority: 2
    status: contracted
    design_contract: features/CP-002/contract.md
    depends_on: [LP-001]
    figma_frames:
      - { name: "Choose day (canonical layout)", node_id: "5185:4332" }
      - { name: "Choose hour", node_id: "5186:4533" }
      - { name: "Details", node_id: "5186:4857" }
      - { name: "Summary (Calendly copy ref)", node_id: "5198:4102" }
    registry_roots:
      - "screen.contact.*"
      - "component.contact.*"

  - id: HIW-003
    title: "How It Works"
    persona: All users — visitors, prospects, agency owners, operations leads
    slice: parent
    story: >-
      As a visitor I want to understand how ML Travel works so I know the
      product value and onboarding flow before booking a demo.
    acceptance_criteria:
      - "Guest can view the how-it-works page matching Figma desktop and mobile frames"
      - "Section animations match Figma dev-mode motion spec"
      - "FAQ section expands and collapses"
      - "Mid-page and final CTAs link to contact / demo booking (CP-002)"
      - "MUST feature-split → HIW-003.1 API (if any), HIW-003.2 UI"
    priority: 3
    status: contracted
    design_contract: features/HIW-003/contract.md
    depends_on: [LP-001]
    figma_frames:
      - { name: "HIW (anchor)", node_id: "5217:6696" }
      - { name: "HIW-Desktop", node_id: "5217:6697" }
      - { name: "HIW-Mobile", node_id: "5217:6715" }
      - { name: "HIWHeroSection", node_id: "5217:6699" }
      - { name: "HowItWorksSection", node_id: "5217:6700" }
      - { name: "SixWeekSection", node_id: "5217:6705" }
      - { name: "FAQSection", node_id: "5261:8072" }
      - { name: "FinalCTASection", node_id: "5217:7555" }
      - { name: "Footer", node_id: "5217:6714" }
    registry_roots:
